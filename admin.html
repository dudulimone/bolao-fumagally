<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bolao Fumagally — Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Arial Black','Arial',sans-serif;background:#0e1a10;color:#fff;font-size:13px;min-height:100vh}

    /* TOAST */
    #toast-container{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
    .toast{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:0;transform:translateY(-12px);transition:all .25s ease;white-space:nowrap}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:#1a4a1e;color:#5aba6a;border:1px solid #2a7a2e}
    .toast.error{background:#3a1010;color:#f08080;border:1px solid #7a2020}
    .toast.info{background:#1a2e1c;color:#a0d8a5;border:1px solid #2a5a2d}
    .toast.warn{background:#3a2e00;color:#f5c518;border:1px solid #7a6000}

    /* HEADER */
    .app-header{background:#111;border-bottom:3px solid #c0392b;padding:14px 20px;text-align:center}
    .header-title{font-size:18px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase}
    .header-sub{font-size:11px;color:#f08080;letter-spacing:2px;text-transform:uppercase;margin-top:2px}

    /* TABS */
    .tabs-bar{background:#111;border-bottom:2px solid #1a7a2e;padding:0 12px;display:flex;justify-content:center;flex-wrap:wrap;overflow-x:auto;scrollbar-width:none}
    .tabs-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;padding:10px 13px;border:none;background:none;cursor:pointer;color:#6b9970;font-size:12px;font-weight:700;border-bottom:3px solid transparent;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
    .tab-btn.active{color:#fff;border-bottom-color:#f5c518}
    .tab-btn:hover:not(.active){color:#fff;background:rgba(255,255,255,.05)}

    .wrap{max-width:1100px;margin:0 auto;padding:16px 14px 60px}
    .panel{display:none}.panel.active{display:block}

    /* CARDS */
    .card{background:#151f16;border:1px solid #2a4a2d;border-radius:10px;padding:14px 16px;margin-bottom:12px}
    .card-title{font-size:13px;font-weight:900;color:#f5c518;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2a4a2d;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

    /* GRID */
    .grid{display:grid;gap:10px}
    .g2{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
    .g3{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
    .g4{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
    .gfull{grid-column:1/-1}

    /* FORMS */
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:11px;color:#7aaa7e;text-transform:uppercase;letter-spacing:.5px}
    input,select,textarea{padding:8px 10px;border-radius:6px;border:1px solid #2a4a2d;background:#0e1a10;color:#fff;font-size:13px;font-family:'Arial',sans-serif;outline:none;transition:border-color .15s;width:100%}
    input:focus,select:focus,textarea:focus{border-color:#1a7a2e}
    textarea{min-height:80px;resize:vertical}
    select option{background:#1a2e1c;color:#fff}

    /* BUTTONS */
    button{padding:8px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:900;font-family:'Arial Black','Arial',sans-serif;text-transform:uppercase;letter-spacing:.5px;border:1px solid #2a4a2d;background:#1a2e1c;color:#7aaa7e;transition:all .15s;white-space:nowrap}
    button:hover{background:#2a4a2d;color:#fff}
    button.primary{background:#1a7a2e;border-color:#155c23;color:#fff}
    button.primary:hover{background:#155c23}
    button.danger{background:#3a1010;border-color:#7a2020;color:#f08080}
    button.warn{background:#3a2e00;border-color:#7a6000;color:#f5c518}
    button:disabled{opacity:.4;cursor:not-allowed}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

    /* STATS */
    .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:12px}
    .stat{background:#0e1a10;border:1px solid #2a4a2d;border-radius:8px;padding:12px 14px}
    .stat-label{font-size:10px;color:#7aaa7e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
    .stat-val{font-size:20px;font-weight:900;color:#fff}
    .stat-sub{font-size:11px;color:#4a7a4e;margin-top:2px}

    /* TABLES */
    .scroll-table{overflow-x:auto;border-radius:8px;border:1px solid #2a4a2d}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{padding:8px 10px;text-align:left;font-weight:900;font-size:11px;color:#f5c518;background:#0e1a10;border-bottom:1px solid #2a4a2d;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
    td{padding:8px 10px;border-bottom:1px solid #1a2e1c;vertical-align:middle;color:#d0e8d2}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#1a2e1c}
    td input,td select{padding:5px 7px;font-size:12px}

    /* BADGES */
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
    .badge-green{background:#1a4a1e;color:#5aba6a;border:1px solid #2a7a2e}
    .badge-red{background:#3a1010;color:#f08080;border:1px solid #7a2020}
    .badge-yellow{background:#3a2e00;color:#f5c518;border:1px solid #7a6000}
    .badge-gray{background:#1a1a1a;color:#888;border:1px solid #333}
    .badge-blue{background:#0a1a3a;color:#60a0f0;border:1px solid #204080}

    /* RANKING */
    .rank-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid #2a4a2d;margin-bottom:6px;background:#0e1a10}
    .rank-item.gold{border-color:#f5c518;background:#1e1800}
    .rank-pos{font-size:15px;font-weight:900;color:#4a7a4e;min-width:26px}
    .rank-name{flex:1;font-weight:700}
    .rank-detail{font-size:11px;color:#4a7a4e}
    .rank-pts{font-size:16px;font-weight:900;color:#7aaa7e}
    .rank-item.gold .rank-pts{color:#f5c518}

    /* RODADA STATUS */
    .rodada-open{background:#1a4a1e;border:1px solid #2a7a2e;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .rodada-closed{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px 14px;margin-bottom:10px;color:#888}
    .dot-green{width:8px;height:8px;border-radius:50%;background:#5aba6a;flex-shrink:0}

    /* LOGIN */
    .login-wrap{max-width:360px;margin:60px auto 0}

    /* PIN */
    .pin-wrap{display:flex;gap:8px;justify-content:center;margin:8px 0}
    .pin-digit{width:52px;height:60px;font-size:24px;font-weight:900;text-align:center;border-radius:8px;border:2px solid #2a4a2d;background:#0e1a10;color:#f5c518;font-family:'Arial Black',sans-serif}
    .pin-digit:focus{border-color:#f5c518;outline:none}

    .screen{display:none}.screen.active{display:block}
    .empty{text-align:center;padding:24px;color:#4a7a4e;font-size:12px;font-style:italic}
    .loading{text-align:center;padding:24px;color:#4a7a4e;font-size:12px}

    datalist option{background:#1a2e1c;color:#fff}
  </style>
</head>
<body>

<div id="toast-container"></div>

<div class="app-header">
  <div class="header-title">🔐 Bolao Fumagally — Admin</div>
  <div class="header-sub">Painel de administracao</div>
</div>

<!-- ═══ LOGIN ADMIN ═══ -->
<div class="screen active" id="screenLogin">
  <div class="login-wrap">
    <div class="card">
      <div class="card-title">Acesso admin</div>
      <div style="margin-bottom:12px">
        <div class="field"><label>Senha admin</label>
          <div class="pin-wrap">
            <input class="pin-digit" id="ap0" type="password" inputmode="numeric" maxlength="1" oninput="apNext(0)">
            <input class="pin-digit" id="ap1" type="password" inputmode="numeric" maxlength="1" oninput="apNext(1)">
            <input class="pin-digit" id="ap2" type="password" inputmode="numeric" maxlength="1" oninput="apNext(2)">
            <input class="pin-digit" id="ap3" type="password" inputmode="numeric" maxlength="1" oninput="apNext(3)">
            <input class="pin-digit" id="ap4" type="password" inputmode="numeric" maxlength="1" oninput="apNext(4)">
            <input class="pin-digit" id="ap5" type="password" inputmode="numeric" maxlength="1" oninput="apNext(5)">
          </div>
        </div>
      </div>
      <button class="primary" onclick="loginAdmin()" style="width:100%">Entrar</button>
      <div id="primeiroAcesso" style="display:none;margin-top:12px;padding:10px;background:#3a2e00;border-radius:6px;font-size:12px;color:#f5c518">
        Primeiro acesso detectado. A senha digitada sera definida como a senha admin permanente.
        <button class="warn" style="width:100%;margin-top:8px" onclick="definirSenhaAdmin()">Definir esta senha</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ PAINEL ADMIN ═══ -->
<div class="screen" id="screenAdmin">
  <div class="tabs-bar" id="tabsBar"></div>
  <div class="wrap">
    <section id="pDashboard"    class="panel active"></section>
    <section id="pRodadas"      class="panel"></section>
    <section id="pResultados"   class="panel"></section>
    <section id="pParticipantes" class="panel"></section>
    <section id="pPalpites"     class="panel"></section>
    <section id="pRanking"      class="panel"></section>
    <section id="pAuditoria"    class="panel"></section>
    <section id="pConfig"       class="panel"></section>
  </div>
</div>

<datalist id="teamsList"></datalist>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue, push, remove, update }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInAnonymously, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

/* ══════════════════════════════════════════════
   🔧 SUBSTITUA AQUI com suas credenciais Firebase
══════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyCFJGr8OUULNGAdgKcTUomWWNFEZeV--tI",
  authDomain:        "bolao-fumagally.firebaseapp.com",
  databaseURL:       "https://bolao-fumagally-default-rtdb.firebaseio.com",
  projectId:         "bolao-fumagally",
  storageBucket:     "bolao-fumagally.firebasestorage.app",
  messagingSenderId: "245185879997",
  appId:             "1:245185879997:web:414724b86406eb6aa17cd4"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

const ADMIN_TABS = [
  {id:'pDashboard',     label:'Dashboard'},
  {id:'pRodadas',       label:'Rodadas'},
  {id:'pResultados',    label:'Resultados'},
  {id:'pParticipantes', label:'Participantes'},
  {id:'pPalpites',      label:'Palpites'},
  {id:'pRanking',       label:'Ranking'},
  {id:'pAuditoria',     label:'Auditoria'},
  {id:'pConfig',        label:'Config'},
];

const defaultTeams=['Argentina','Brasil','Colômbia','Equador','Paraguai','Uruguai','Canadá','Estados Unidos','México','Curaçao','Haiti','Panamá','Alemanha','Áustria','Bélgica','Bósnia e Herzegovina','Croácia','Escócia','Espanha','França','Holanda','Inglaterra','Noruega','Portugal','República Tcheca','Suécia','Suíça','Turquia','África do Sul','Argélia','Cabo Verde','Costa do Marfim','Egito','Gana','Marrocos','República Democrática do Congo','Senegal','Tunísia','Arábia Saudita','Austrália','Coreia do Sul','Irã','Iraque','Japão','Jordânia','Catar','Uzbequistão','Nova Zelândia'];

/* ── SHA-256 ── */
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── Toast ── */
function toast(msg,type='success',dur=2800){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.textContent=msg;
  c.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},dur);
}
window.toast=toast;

/* ── Telas ── */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

/* ── PIN Helpers ── */
function apNext(i){const v=document.getElementById(`ap${i}`).value;if(v&&i<5)document.getElementById(`ap${i+1}`).focus();}
window.apNext=apNext;
function getAdminPin(){return ['0','1','2','3','4','5'].map(i=>document.getElementById(`ap${i}`).value).join('');}

/* ── Login admin ── */
async function loginAdmin(){
  const pin=getAdminPin();
  if(pin.length!==6){toast('PIN deve ter 6 digitos!','error');return;}
  const snap=await get(ref(db,'config/admin_password_hash'));
  if(!snap.exists()){
    document.getElementById('primeiroAcesso').style.display='block';
    return;
  }
  const hash=await sha256(pin);
  if(hash!==snap.val()){toast('Senha incorreta!','error');return;}
  toast('Bem-vindo, admin!','success');
  afterLoginAdmin();
}
window.loginAdmin=loginAdmin;

async function definirSenhaAdmin(){
  const pin=getAdminPin();
  if(pin.length!==6){toast('PIN deve ter 6 digitos!','error');return;}
  const hash=await sha256(pin);
  await set(ref(db,'config/admin_password_hash'),hash);
  toast('Senha admin definida!','success');
  afterLoginAdmin();
}
window.definirSenhaAdmin=definirSenhaAdmin;

/* ── Pós-login admin ── */
function afterLoginAdmin(){
  showScreen('screenAdmin');
  buildTabs();
  loadAdminData();
}

function buildTabs(){
  document.getElementById('tabsBar').innerHTML=ADMIN_TABS.map((t,i)=>
    `<button class="tab-btn${i===0?' active':''}" onclick="openTab('${t.id}',this)">${t.label}</button>`
  ).join('');
}

function openTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn)btn.classList.add('active');
  renderAll();
}
window.openTab=openTab;

/* ── Dados reativos ── */
let allData={config:{},users:{},palpites:{},resultados:{},auditoria:{},ranking:{}};

function loadAdminData(){
  onValue(ref(db,'config'), s=>{ allData.config=s.val()||{}; tickRodadas(); renderAll(); });
  onValue(ref(db,'users'),  s=>{ allData.users=s.val()||{};  renderAll(); });
  onValue(ref(db,'palpites'),s=>{ allData.palpites=s.val()||{}; renderAll(); });
  onValue(ref(db,'resultados_oficiais'),s=>{ allData.resultados=s.val()||{}; renderAll(); });
  onValue(ref(db,'auditoria'),s=>{ allData.auditoria=s.val()||{}; renderAll(); });
  loadTeams();
}

async function loadTeams(){
  const snap=await get(ref(db,'config/teams'));
  const teams=snap.exists()?snap.val():defaultTeams;
  document.getElementById('teamsList').innerHTML=teams.map(t=>`<option value="${t}"></option>`).join('');
}

function renderAll(){
  renderDashboard();
  renderRodadas();
  renderResultados();
  renderParticipantes();
  renderPalpites();
  renderRanking();
  renderAuditoria();
  renderConfig();
}

const esc=v=>String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

/* ════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════ */
function renderDashboard(){
  const users=allData.users;
  const rodadaAberta=allData.config.rodada_aberta||null;
  const nUsers=Object.keys(users).length;
  const nPagos=Object.values(users).filter(u=>u.pago).length;
  const t=calcTotals();
  const pote=nPagos*(allData.config?.valor||50);
  document.getElementById('pDashboard').innerHTML=`
    <div class="stat-row">
      <div class="stat"><div class="stat-label">Participantes</div><div class="stat-val">${nPagos}<span style="font-size:12px;color:#4a7a4e">/${nUsers}</span></div></div>
      <div class="stat"><div class="stat-label">Pote</div><div class="stat-val">${money(pote)}</div></div>
      <div class="stat"><div class="stat-label">Rodada</div><div class="stat-val" style="font-size:15px;color:${rodadaAberta?'#5aba6a':'#f08080'}">${rodadaAberta||'Fechada'}</div></div>
      <div class="stat"><div class="stat-label">Lider</div><div class="stat-val" style="font-size:14px;color:#f5c518">${t[0]?.nome||'—'}</div><div class="stat-sub">${t[0]?t[0].total+' pts':''}</div></div>
    </div>
    <div class="grid g2">
      <div class="card">
        <div class="card-title">Top 5</div>
        ${t.length?t.slice(0,5).map((p,i)=>`
          <div class="rank-item${i===0?' gold':''}">
            <div class="rank-pos">${i+1}o</div>
            <div style="flex:1"><div class="rank-name">${esc(p.nome)}</div><div class="rank-detail">Gerais ${p.gerais} · Mata ${p.mata} · Diario ${p.diario} · Class ${p.class}</div></div>
            <div class="rank-pts">${p.total}</div>
          </div>`).join(''):'<div class="empty">Sem dados.</div>'}
      </div>
      <div class="card">
        <div class="card-title">Premiacao</div>
        <div style="font-size:13px">
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a2e1c"><span style="color:#7aaa7e">1o lugar (${allData.config?.p1||60}%)</span><b>${money(pote*(allData.config?.p1||60)/100)}</b></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a2e1c"><span style="color:#7aaa7e">2o lugar (${allData.config?.p2||20}%)</span><b>${money(pote*(allData.config?.p2||20)/100)}</b></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a2e1c"><span style="color:#7aaa7e">3o lugar (${allData.config?.p3||10}%)</span><b>${money(pote*(allData.config?.p3||10)/100)}</b></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:#7aaa7e">Doacao (${allData.config?.doacao||10}%)</span><b>${money(pote*(allData.config?.doacao||10)/100)}</b></div>
        </div>
      </div>
    </div>`;
}

/* ════════════════════════════════════════
   RODADAS — múltiplas simultâneas + abertura/fechamento agendado
   Estrutura no banco:
   /config/rodadas/{id} = { tipo, desc, status:'agendada'|'aberta'|'fechada',
                             abre_em, fecha_em, criado_em, jogo? }
════════════════════════════════════════ */

/* Verifica automaticamente rodadas que devem abrir ou fechar */
function tickRodadas(){
  const rodadas=allData.config?.rodadas||{};
  const agora=Date.now();
  Object.entries(rodadas).forEach(([id,r])=>{
    if(r.status==='agendada' && r.abre_em && agora>=r.abre_em){
      set(ref(db,`config/rodadas/${id}/status`),'aberta');
    }
    if(r.status==='aberta' && r.fecha_em && agora>=r.fecha_em){
      set(ref(db,`config/rodadas/${id}/status`),'fechada');
    }
  });
}
setInterval(tickRodadas, 10000); // checa a cada 10s

function fmtDt(ts){
  if(!ts)return'—';
  return new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function renderRodadas(){
  const rodadas=allData.config?.rodadas||{};
  const lista=Object.entries(rodadas).sort((a,b)=>(b[1].criado_em||0)-(a[1].criado_em||0));
  const abertas=lista.filter(([,r])=>r.status==='aberta');
  const agendadas=lista.filter(([,r])=>r.status==='agendada');
  const fechadas=lista.filter(([,r])=>r.status==='fechada');

  function rodadaCard([id,r]){
    const cor=r.status==='aberta'?'#5aba6a':r.status==='agendada'?'#f5c518':'#4a7a4e';
    const bg=r.status==='aberta'?'#1a4a1e':r.status==='agendada'?'#3a2e00':'#1a1a1a';
    const border=r.status==='aberta'?'#2a7a2e':r.status==='agendada'?'#7a6000':'#333';
    const nPalp=Object.values(allData.palpites||{}).filter(p=>p[id]).length;
    return`<div style="background:${bg};border:1px solid ${border};border-radius:8px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px">
        <div>
          <b style="color:${cor}">${esc(r.desc||id)}</b>
          <span class="badge badge-gray" style="margin-left:6px">${esc(r.tipo)}</span>
          <span style="font-size:10px;color:${cor};margin-left:6px;text-transform:uppercase;font-weight:700">${r.status}</span>
        </div>
        <span class="badge badge-blue">${nPalp} palpites</span>

// Converte valor de datetime-local para timestamp UTC correto (sem ajuste de fuso)
// O datetime-local já é interpretado como horário local pelo browser — não precisa ajustar
// Mas new Date(str) sem timezone trata como UTC — precisamos forçar como local
function localToTs(str) {
  if (!str) return null;
  // Adiciona :00 se não tiver segundos
  const full = str.length === 16 ? str + ':00' : str;
  // Cria data interpretando como horário LOCAL (não UTC)
  const [date, time] = full.split('T');
  const [y, m, d] = date.split('-').map(Number);
  const [h, min, s] = time.split(':').map(Number);
  return new Date(y, m - 1, d, h, min, s || 0).getTime();
}

window.criarRodada=async function(){
  const tipo=document.getElementById('novaRodadaTipo')?.value;
  const nomeInput=document.getElementById('novaRodadaNome')?.value?.trim();
  const abreInput=document.getElementById('novaRodadaAbre')?.value;
  const fechaInput=document.getElementById('novaRodadaFecha')?.value;
  const agora=Date.now();
  const abre_em=abreInput?localToTs(abreInput):agora;
  const fecha_em=fechaInput?localToTs(fechaInput):null;
  const status=abre_em<=agora?'aberta':'agendada';

  let rodadaId='';
  let desc='';
  let jogoData=null;

  if(tipo==='apostas_gerais'){
    rodadaId='apostas_gerais'; desc='Apostas gerais';
  } else if(tipo==='classificados'){
    rodadaId='classificados'; desc='32 Classificados';
  } else if(tipo==='diario'){
    const nome=nomeInput||'diario';
    rodadaId=nome.toLowerCase().replace(/\s/g,'_').replace(/[^a-z0-9_]/g,'');
    desc=nomeInput||'Palpite diario';
  } else if(tipo==='mata_mata'){
    const a=document.getElementById('nrA')?.value?.trim();
    const b=document.getElementById('nrB')?.value?.trim();
    const fase=document.getElementById('nrFase')?.value;
    const descJogo=document.getElementById('nrDesc')?.value?.trim();
    if(!a||!b){toast('Informe os dois times!','error');return;}
    rodadaId=`${a.toLowerCase().replace(/\s/g,'_')}_x_${b.toLowerCase().replace(/\s/g,'_')}`;
    desc=descJogo||`${a} x ${b}`;
    jogoData={desc,a,b,fase,criado_em:agora};
  }

  if(!rodadaId){toast('Informe o nome da rodada!','error');return;}

  // Verifica se ID já existe
  const snap=await get(ref(db,`config/rodadas/${rodadaId}`));
  if(snap.exists()&&snap.val().status!=='fechada'){
    toast(`Ja existe uma rodada "${rodadaId}" ativa. Use outro nome.`,'error');return;
  }

  const jogosDia=document.getElementById('nrJogosDia')?.value?.trim()||null;
  const rodadaObj={tipo,desc,status,abre_em,criado_em:agora};
  if(jogosDia) rodadaObj.jogos_do_dia=jogosDia;
  if(fecha_em)rodadaObj.fecha_em=fecha_em;
  if(jogoData){
    rodadaObj.jogo=jogoData;
    await set(ref(db,`config/jogos/${rodadaId}`),jogoData);
  }

  await set(ref(db,`config/rodadas/${rodadaId}`),rodadaObj);
  await auditAdmin('RODADA_CRIADA',rodadaId,'null',`status=${status}`);
  toast(`Rodada "${desc}" ${status==='aberta'?'aberta':'agendada'}!`,'success');
};

/* ════════════════════════════════════════
   CALCULOS DE RANKING
════════════════════════════════════════ */
function norm(v){return String(v||'').trim().toLowerCase();}

function calcTotals(){
  const users=allData.users||{};
  const palpites=allData.palpites||{};
  const r=allData.resultados||{};
  const realSemis=(r.semis||[]).map(norm);
  const realClass=(r.classificados||[]).map(norm).filter(Boolean);
  const jogos=r.jogos||{};

  return Object.entries(users).map(([uid,u])=>{
    // userKey pode ser o campo salvo ou o proprio uid (compatibilidade)
    const userKey = u.userKey || uid;
    const meusPalpites=palpites[userKey]||{};
    let gerais=0,classPts=0,diario=0,mata=0;

    // Apostas gerais
    const ag=meusPalpites['apostas_gerais']||{};
    if(norm(ag.campeao)&&norm(ag.campeao)===norm(r.campeao))gerais+=10;
    if(norm(ag.vice)&&norm(ag.vice)===norm(r.vice))gerais+=6;
    if(norm(ag.art)&&norm(ag.art)===norm(r.artilheiro))gerais+=5;
    // Todos os 4 semifinalistas pontuam — campeão e vice acumulam com os 10/6 pts
    [ag.s1,ag.s2,ag.s3,ag.s4].map(norm).filter(Boolean).forEach(s=>{if(realSemis.includes(s))gerais+=3;});

    // Classificados
    const classP=meusPalpites['classificados']||{};
    if(classP.selecoes) classPts=(classP.selecoes||[]).map(norm).filter(t=>realClass.includes(t)).length;

    // Palpites diários
    Object.entries(meusPalpites).forEach(([rodada,dados])=>{
      if(dados.tipo==='diario'){
        if(dados.acertou==='sim'){
          const isZebra=dados.tipoPalpite==='zebra';
          const isArtilheiro=dados.tipoAposta==='artilheiro';
          diario+=(isZebra||isArtilheiro)?5:3;
        }
      }
    });

    // Mata-mata
    Object.entries(meusPalpites).forEach(([rodada,dados])=>{
      if(dados.tipo==='mata_mata'){
        const res=jogos[rodada];
        if(!res)return;
        const mult=res.fase==='Final'?(allData.config?.finalMult||2):1;
        const exact=allData.config?.exact||5;
        const passaPts=allData.config?.passa||3;
        // Infere passa pelo placar quando campo está vazio
        let passaPalpite=dados.passa;
        if(!norm(passaPalpite)&&dados.pa!=null&&dados.pb!=null){
          const paN=Number(dados.pa),pbN=Number(dados.pb);
          if(paN>pbN) passaPalpite=res.a||'';
          else if(pbN>paN) passaPalpite=res.b||'';
        }
        if(Number(res.ra)===Number(dados.pa)&&Number(res.rb)===Number(dados.pb))mata+=exact*mult;
        else if(norm(res.passa)===norm(passaPalpite)&&norm(passaPalpite))mata+=passaPts*mult;
      }
    });

    // Desempate: maior criado_em entre todos os palpites (quem editou por último perde)
    const ultimoEdit = Object.values(meusPalpites).reduce((max,d)=>Math.max(max,d.criado_em||0),0);

    return{uid,nome:u.nome,gerais,class:classPts,diario,mata,total:gerais+classPts+diario+mata,ultimoEdit};
  }).sort((a,b)=>{
    // 1. Total
    if(b.total!==a.total) return b.total-a.total;
    // 2. Gerais
    if(b.gerais!==a.gerais) return b.gerais-a.gerais;
    // 3. Mata-mata
    if(b.mata!==a.mata) return b.mata-a.mata;
    // 4. Diário
    if(b.diario!==a.diario) return b.diario-a.diario;
    // 5. Classificados
    if(b.class!==a.class) return b.class-a.class;
    // 6. Quem editou por último perde (menor ultimoEdit vence)
    return a.ultimoEdit-b.ultimoEdit;
  });
}

async function recalcularRanking(){
  const t=calcTotals();
  const cache={};
  t.forEach(p=>{ cache[p.uid]={nome:p.nome,total:p.total,gerais:p.gerais,class:p.class,diario:p.diario,mata:p.mata,ultimoEdit:p.ultimoEdit||0}; });
  await set(ref(db,'ranking_cache'),cache);
  toast('Ranking recalculado!','success');

        <td><span class="badge badge-blue">${nPalp}</span></td>

window.resetarPin=async function(uid, nome){
  const novoPIN = prompt(`PIN temporario para ${nome} (4 digitos):`);
  if(!novoPIN || novoPIN.length!==4 || isNaN(novoPIN)){toast('PIN invalido. Use 4 digitos numericos.','error');return;}
  // Hash usa o UID do PARTICIPANTE (uid passado como parametro), nao o uid do admin
  const encoder = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', encoder.encode(novoPIN + uid));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  await set(ref(db,`users/${uid}/pin_hash`), hash);
  await auditAdmin('PIN_RESETADO', uid, nome, `PIN temporario definido para ${nome}`);
  toast(`PIN de ${nome} redefinido! PIN temporario: ${novoPIN}`,'success', 6000);
};

window.togglePago=async function(uid, atual){
  await set(ref(db,`users/${uid}/pago`), !atual);
  const u=allData.users?.[uid];
  await auditAdmin(!atual?'PAGAMENTO_CONFIRMADO':'PAGAMENTO_REMOVIDO', uid, String(atual), String(!atual));
  toast(!atual?`${u?.nome||uid} marcado como pago!`:`${u?.nome||uid} desmarcado.`, !atual?'success':'info');
};

window.filterUsers=function(q){
  const filtered=Object.entries(allData.users||{}).filter(([,u])=>u.nome?.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('usersTableWrap').innerHTML=renderUsersTable(filtered);
};

window.removerParticipante=async function(uid,nome){
  if(!confirm(`Remover ${nome} e todos os seus palpites?`))return;
  await remove(ref(db,`users/${uid}`));
  await remove(ref(db,`palpites/${uid}`));
  await remove(ref(db,`ranking_cache/${uid}`));
  await auditAdmin('PARTICIPANTE_REMOVIDO',uid,nome,'removido');
  toast(`${nome} removido.`,'info');
};

function renderPalpites(){
  const rows=[];

  const userKeyToNome = {};
  Object.entries(allData.users||{}).forEach(([uid,u])=>{
    userKeyToNome[u.userKey||uid] = u.nome||uid;
  });
  Object.entries(allData.palpites||{}).forEach(([userKey,rodadas])=>{
    const nome=userKeyToNome[userKey]||allData.users?.[userKey]?.nome||userKey;
    Object.entries(rodadas).forEach(([rodada,dados])=>{
      rows.push({uid:userKey,nome,rodada,dados});
    });
  });
  rows.sort((a,b)=>b.dados.criado_em-a.dados.criado_em);

  document.getElementById('pPalpites').innerHTML=`
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 14px;border-bottom:1px solid #2a4a2d;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="card-title" style="margin:0;border:none;padding:0;flex:1">Todos os palpites (${rows.length})</div>
        <select id="filterRodada" style="max-width:220px" onchange="filterPalpites()">
          <option value="">Todas as rodadas</option>
          ${[...new Set(rows.map(r=>r.rodada))].sort().map(rod=>`<option value="${esc(rod)}">${esc(rod)}</option>`).join('')}
        </select>
        <input id="searchPalp" style="max-width:160px" placeholder="Buscar participante..." oninput="filterPalpites()">
      </div>
      <div id="palpitesTableWrap">${renderPalpitesTable(rows)}</div>
    </div>`;
}

function renderPalpitesTable(rows){
  if(!rows.length)return'<div class="empty">Nenhum palpite.</div>';
  return`<div class="scroll-table"><table>
    <thead><tr><th>Participante</th><th>Rodada</th><th>Tipo</th><th>Palpite</th><th>Resultado</th><th>Data</th></tr></thead>
    <tbody>${rows.map(({uid,nome,rodada,dados})=>{
      // Sem palpite — linha vazia
      if(!dados){
        return`<tr style="opacity:0.5">
          <td style="color:#f5c518"><b>${esc(nome)}</b></td>
          <td><span class="badge badge-gray">${esc(rodada)}</span></td>
          <td>—</td>
          <td style="color:#4a7a4e;font-style:italic">Não apostou</td>
          <td></td>
          <td>—</td>
        </tr>`;
      }
      const isDiario=dados.tipo==='diario';
      const acertou=dados.acertou||'';
      const pts=(dados.tipoPalpite==='zebra'||dados.tipoAposta==='artilheiro')?5:3;
      let acertoCell='<td></td>';
      if(isDiario){
        const zebraId=`zb_${uid}_${rodada}`.replace(/[^a-z0-9_]/gi,'_');
        const foiZebra=dados.tipoPalpite==='zebra';
        if(acertou==='sim'){
          acertoCell=`<td>
            <span class="badge badge-green">+${pts}pts${foiZebra?' (zebra)':''}</span><br>
            <button style="padding:3px 8px;font-size:10px;margin-top:4px" class="danger" onclick="marcarAcerto('${uid}','${rodada}','nao')">Desfazer</button>
          </td>`;
        } else if(acertou==='nao'){
          acertoCell=`<td><span class="badge badge-red">Errou</span><br>
            <button style="padding:3px 8px;font-size:10px;margin-top:4px" class="primary" onclick="marcarAcerto('${uid}','${rodada}','sim')">Acertou</button>
          </td>`;
        } else {
          acertoCell=`<td style="min-width:110px">
            <button style="padding:4px 10px;font-size:11px;margin-right:4px;margin-bottom:4px" class="primary" onclick="marcarAcerto('${uid}','${rodada}','sim')">Acertou</button>
            <button style="padding:4px 10px;font-size:11px" class="danger" onclick="marcarAcerto('${uid}','${rodada}','nao')">Errou</button>
          </td>`;
        }
      }
      return`<tr>
        <td style="color:#f5c518"><b>${esc(nome)}</b></td>
        <td><span class="badge badge-gray">${esc(rodada)}</span></td>
        <td><span class="badge badge-blue">${esc(dados.tipo||'—')}</span>${isDiario&&dados.tipoPalpite==='zebra'?'<span class="badge badge-yellow" style="margin-left:4px">Zebra</span>':''}</td>
        <td style="font-size:11px;color:#a0d8a5;max-width:280px">${formatResumoPalpite(dados)}</td>
        ${acertoCell}
        <td style="color:#4a7a4e;font-size:11px">${new Date(dados.criado_em).toLocaleString('pt-BR')}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

window.marcarAcerto=async function(uid,rodada,valor){
  // tipoPalpite já foi salvo automaticamente pelo participante (zebra ou normal)
  const snap = await get(ref(db,`palpites/${uid}/${rodada}`));
  const filtroRodada=document.getElementById('filterRodada')?.value||'';
  const filtroBusca=document.getElementById('searchPalp')?.value||'';
  const foiZebra = snap.exists() && (snap.val().tipoPalpite==='zebra'||snap.val().tipoAposta==='artilheiro');
  await set(ref(db,`palpites/${uid}/${rodada}/acertou`),valor);
  await auditAdmin('DIARIO_ACERTO',rodada,uid,`${uid}=${valor}${foiZebra?' zebra':''}`);
  const pts=foiZebra?5:3;
  toast(valor==='sim'?`Acertou! +${pts}pts${foiZebra?' (zebra)':''}`:'Marcado como errou.',valor==='sim'?'success':'info');
  await recalcularRanking();
  const selRodada=document.getElementById('filterRodada');
  const inpBusca=document.getElementById('searchPalp');
  if(selRodada) selRodada.value=filtroRodada;
  if(inpBusca) inpBusca.value=filtroBusca;
  if(filtroRodada||filtroBusca) filterPalpites();
};

function formatResumoPalpite(d){
  if(d.tipo==='diario') return esc(d.palpite||'—');
  if(d.tipo==='apostas') return [
    `<b style="color:#f5c518">Camp:</b> ${esc(d.campeao||'—')}`,
    `<b style="color:#f5c518">Vice:</b> ${esc(d.vice||'—')}`,
    `<b style="color:#f5c518">Semis:</b> ${[d.s1,d.s2,d.s3,d.s4].filter(Boolean).map(esc).join(', ')||'—'}`,
    `<b style="color:#f5c518">Art:</b> ${esc(d.art||'—')}`
  ].join('<br>');
  if(d.tipo==='mata_mata') return `Placar: ${d.pa??'—'} x ${d.pb??'—'} · Passa: ${esc(d.passa||'—')}`;
  if(d.tipo==='classificados'){
    const s=d.selecoes||[];
    return `<span style="color:#7aaa7e">${s.length}/32:</span> ${s.map(esc).join(', ')||'—'}`;
  }
  return JSON.stringify(d).slice(0,80);
}

window.filterPalpites=function(){
  const q=(document.getElementById('searchPalp')?.value||'').toLowerCase();
  const rodadaFiltro=document.getElementById('filterRodada')?.value||'';
  const all=[];
  const ukNome2={};
  Object.entries(allData.users||{}).forEach(([uid,u])=>{ ukNome2[u.userKey||uid]=u.nome||uid; });

  // Participantes que apostaram nesta rodada específica
  const apostaramNaRodada=new Set();
  Object.entries(allData.palpites||{}).forEach(([userKey,rodadas])=>{
    const nome=ukNome2[userKey]||allData.users?.[userKey]?.nome||userKey;
    if(q&&!nome.toLowerCase().includes(q))return;
    Object.entries(rodadas).forEach(([rodada,dados])=>{
      if(rodadaFiltro&&rodada!==rodadaFiltro)return;
      apostaramNaRodada.add(userKey);
      all.push({uid:userKey,nome,rodada,dados});
    });
  });

  // Se filtro de rodada ativo, adiciona quem não apostou nessa rodada
  if(rodadaFiltro){
    Object.entries(allData.users||{}).forEach(([uid,u])=>{
      const uk=u.userKey||uid;
      const nome=u.nome||uid;
      if(q&&!nome.toLowerCase().includes(q))return;
      if(apostaramNaRodada.has(uk))return;
      all.push({uid:uk,nome,rodada:rodadaFiltro,dados:null});
    });
  }

  all.sort((a,b)=>{
    // Quem apostou primeiro, quem não apostou vai pro final
    if(!a.dados&&b.dados)return 1;
    if(a.dados&&!b.dados)return -1;
    if(!a.dados&&!b.dados)return a.nome.localeCompare(b.nome);
    return b.dados.criado_em-a.dados.criado_em;
  });
  document.getElementById('palpitesTableWrap').innerHTML=renderPalpitesTable(all);
};

window.copiarRankingWpp=function(){
  const t=calcTotals();
  const medals=['🥇','🥈','🥉'];
  let txt='*🐔🔥 Bolao Fumagally — Ranking*\n\n';
  t.forEach((p,i)=>{ txt+=`${medals[i]||(i+1)+'o'} *${p.nome}* — ${p.total} pts\n`; });
  txt+='\n_Gerais | Class | Diario | Mata_\n';
  t.forEach(p=>{ txt+=`• ${p.nome}: ${p.gerais} | ${p.class} | ${p.diario} | ${p.mata}\n`; });
  txt+='\n_Fumagally United ❤️_';
  navigator.clipboard.writeText(txt).then(()=>toast('Ranking copiado!','success'));
};
